name: ✨ Feature request
description: Propose an enhancement to AURA.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea! Please check the [roadmap](https://github.com/showerideas/Aura#-roadmap) and [open feature requests](https://github.com/showerideas/Aura/issues?q=label%3Aenhancement) first — your idea might already be tracked.

  - type: textarea
    id: problem
    attributes:
      label: Problem this feature solves
      description: What user pain point are we addressing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Sketches / mockups very welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you reject, and why?

  - type: dropdown
    id: surface
    attributes:
      label: Which area does this touch?
      options:
        - UX / UI
        - Crypto / security
        - Transport (BLE / Nearby Connections)
        - Gesture authentication
        - Persistence / Room
        - Build / CI
        - Documentation
        - Something else
    validations:
      required: true

  - type: checkboxes
    id: principle-fit
    attributes:
      label: AURA principle fit
      description: AURA is **offline-first, zero-server, zero-PII-egress**. Confirm your idea doesn't break that.
      options:
        - label: This feature does **not** require a backend, account, or any outbound network call
          required: true
        - label: This feature does **not** weaken the gesture / biometric / ECDH gates
          required: true
