name: 🐞 Bug report
description: Something AURA is doing wrong on a real device.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing! Please confirm the bug reproduces on the latest [release](https://github.com/showerideas/Aura/releases/latest) before opening.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: After triple-pressing vol ▼ the gesture screen never appears…
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install vX.Y.Z
        2. …
        3. Observe …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / OS
      placeholder: "Pixel 7 · Android 14 · OS build TQ3A.230805.001"
    validations:
      required: true

  - type: input
    id: aura-version
    attributes:
      label: AURA version
      placeholder: "1.0.0 (versionCode 1)"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logcat / screenshot
      description: |
        If applicable, attach a screenshot or paste relevant logcat output.
        ⚠️ Please redact any personal data (names, phone numbers, emails) — AURA never sends data anywhere, so the logs are *your* private record.
      render: shell

  - type: checkboxes
    id: confirms
    attributes:
      label: Pre-flight checks
      options:
        - label: I am on the latest release
          required: true
        - label: I searched [open issues](https://github.com/showerideas/Aura/issues) and didn't find a duplicate
          required: true
