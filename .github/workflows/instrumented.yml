# PR-39: connectedAndroidTest emulator job.
#
# This is the gate the original PR-22c CI workflow deliberately skipped —
# Espresso (`ExchangeFlowEspressoTest`) and Room migration / DAO tests
# (`MigrationTest`, `ContactDaoTest`, `BlockedEndpointDaoTest`,
# `ProfileDaoTest`) need a running Android emulator, which roughly
# triples the runtime of a CI job. We split it into its own workflow so
# the cheap `ci.yml` checks (unit tests, lint, assembleRelease) still
# gate every PR in under 6 minutes; this slower job runs in parallel
# and reports its own status.
#
# Runs on:
#   - pull_request that touches /app, /gradle, or this workflow
#   - manual dispatch (so maintainers can re-run after flake)
#   - weekly schedule (so dependency-only weeks don't go untested)
#
# AVD config (API 30, Pixel 5, x86_64) is the GitHub-recommended setup
# that consistently boots in <90s on `ubuntu-latest` with hw accel.

name: Instrumented tests

on:
  pull_request:
    paths:
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/instrumented.yml'
  workflow_dispatch:
  schedule:
    # Sundays 03:17 UTC — quiet hour for the runner pool.
    - cron: '17 3 * * 0'

concurrency:
  group: instrumented-${{ github.ref }}
  cancel-in-progress: true

jobs:
  connectedAndroidTest:
    name: connectedDebugAndroidTest (API 30)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    # PR-39 lands the *infrastructure*: emulator boot, AVD cache,
    # connectedDebugAndroidTest invocation, report upload. The actual
    # instrumentation suite has 3 known-flaky tests (MigrationTest x2,
    # ExchangeFlowEspressoTest x1) that need a follow-up to harden.
    # Until then, this workflow reports its status but does NOT gate
    # PR merges — ci.yml is still the required check. Flip this to
    # `false` once the suite is green for two consecutive runs.
    continue-on-error: true

    strategy:
      fail-fast: false
      matrix:
        api-level: [30]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Enable KVM so the emulator can run with hardware acceleration.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}-v1

      - name: Create AVD and generate snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot for caching."

      - name: Run connectedDebugAndroidTest
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-reports-api-${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests
            app/build/outputs/androidTest-results
          if-no-files-found: ignore
          retention-days: 14
