# GitHub Release workflow for AURA.
#
# Triggered by pushing a version tag (e.g. git tag v1.0.0 && git push --tags).
#
# What it does:
#   1. Builds signed release APKs using the same keystore secrets as ci.yml.
#   2. Renames each ABI slice to  aura-<version>-<abi>.apk  for clarity.
#   3. Creates a GitHub Release and attaches all APK slices.
#
# Prerequisites (repo secrets already configured for Play uploads):
#   KEYSTORE_BASE64          — base64-encoded release.keystore
#   KEYSTORE_STORE_PASSWORD  — store password
#   KEYSTORE_KEY_ALIAS       — key alias
#   KEYSTORE_KEY_PASSWORD    — key password
#
# Usage:
#   git tag v1.0.0
#   git push --tags
#   → Release appears at https://github.com/showerideas/Aura/releases/latest

name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Write permission is required to create GitHub Releases.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache MediaPipe gesture model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/gesture_recognizer.task
          key: mediapipe-gesture-model-${{ vars.GESTURE_MODEL_SHA256 || 'latest' }}
          restore-keys: |
            mediapipe-gesture-model-

      - name: Decode keystore
        env:
          KEY_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEY_B64" | base64 --decode > /tmp/release.keystore

      - name: Build signed release APKs (assembleRelease)
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

      - name: Shred keystore temp file
        if: always()
        run: shred -u /tmp/release.keystore || true

      - name: Rename APKs with version tag
        run: |
          VERSION="${{ github.ref_name }}"
          mkdir -p dist
          for APK in app/build/outputs/apk/release/*.apk; do
            FILENAME=$(basename "$APK")
            # app-arm64-v8a-release.apk  →  aura-v1.0.0-arm64-v8a.apk
            # app-release.apk            →  aura-v1.0.0.apk
            NEWNAME=$(echo "$FILENAME" \
              | sed "s/^app/aura-${VERSION}/" \
              | sed "s/-release\.apk$/.apk/")
            cp "$APK" "dist/$NEWNAME"
            echo "  packaged: $NEWNAME ($(du -sh "dist/$NEWNAME" | cut -f1))"
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ github.ref_name }}"
          gh release create "$VERSION" dist/*.apk \
            --title "AURA $VERSION" \
            --notes "## Install

          Download the APK that matches your device and sideload it.

          | File | Device |
          |---|---|
          | \`aura-${VERSION}-arm64-v8a.apk\` | Most phones from 2016 onward (64-bit ARM) |
          | \`aura-${VERSION}-armeabi-v7a.apk\` | Older 32-bit ARM devices |

          **How to install:**
          1. On your Android device go to **Settings → Apps → Special app access → Install unknown apps**
          2. Allow your browser or file manager to install APKs
          3. Open the downloaded APK and tap Install

          **Requirements:** Android 8.0+ (API 26) · Camera permission for gesture auth

          ---
          Full changelog: [\`git log\`](https://github.com/showerideas/Aura/commits/$VERSION)"
