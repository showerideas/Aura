name: iOS Build

on:
  push:
    branches: [ "main", "phase/**", "fix/**" ]
    paths:
      - "ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "ios/**"
  workflow_dispatch:   # allow manual re-run from GitHub Actions UI

jobs:
  build-and-test:
    name: Swift Package — build + test (macOS)
    runs-on: macos-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── Swift Build Cache ─────────────────────────────────────────────────
      # Caches the .build directory to cut cold-start time from ~4 min to ~30 s.
      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: ios/.build
          key: ${{ runner.os }}-swift-${{ hashFiles('ios/Package.swift', 'ios/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-

      # ── Show Swift / Xcode versions for traceability ──────────────────────
      - name: Swift version
        run: swift --version

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build AuraCore + AuraCompanion
        working-directory: ios
        run: swift build -c release

      # ── Unit tests (macOS runner — no iOS simulator required) ─────────────
      - name: Run AuraCoreTests
        working-directory: ios
        run: |
          swift test \
            --filter AuraCoreTests \
            --enable-code-coverage \
            --verbose

      # ── Coverage report (informational — does not gate the build) ─────────
      - name: Generate coverage report
        working-directory: ios
        run: |
          PROF_DATA=$(find .build -name '*.profdata' | head -1)
          BINARY=$(find .build -name 'AuraCoreTests.xctest' -o -name 'AuraCoreTests' | head -1)
          if [ -n "$PROF_DATA" ] && [ -n "$BINARY" ]; then
            xcrun llvm-cov report \
              --instr-profile "$PROF_DATA" \
              "$BINARY" \
              --ignore-filename-regex='Tests/' \
              2>/dev/null || echo "Coverage report unavailable (binary path mismatch)"
          else
            echo "No profdata found — skipping coverage report"
          fi
        continue-on-error: true   # informational only

      # ── Package resolution check (catches dependency drift) ───────────────
      - name: Verify Package.resolved is up to date
        working-directory: ios
        run: |
          swift package resolve
          # If Package.resolved changed, the package has drifted — warn but don't fail
          if git diff --quiet ios/Package.resolved 2>/dev/null; then
            echo "Package.resolved is up to date"
          else
            echo "WARNING: Package.resolved changed after resolve — commit the updated file"
          fi
        continue-on-error: true
