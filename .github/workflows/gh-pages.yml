# v1.3: Deploy AURA privacy policy to GitHub Pages.
#
# Serves PRIVACY_POLICY.md at https://showerideas.app/aura/privacy via the
# gh-pages branch. Jekyll (enabled by default on GitHub Pages) renders the
# Markdown to HTML automatically.
#
# Custom domain setup (one-time, outside this workflow):
#   1. Add a CNAME DNS record: showerideas.app → showerideas.github.io
#   2. In the repo's Settings → Pages, set the custom domain to showerideas.app
#      and enable "Enforce HTTPS".
#
# Runs on:
#   - push to main that touches PRIVACY_POLICY.md
#   - manual dispatch (re-deploy after DNS / domain changes)

name: Deploy privacy policy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'PRIVACY_POLICY.md'
      - '.github/workflows/gh-pages.yml'
  workflow_dispatch:

concurrency:
  group: gh-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to gh-pages
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write   # peaceiris/actions-gh-pages needs push access

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the deploy tree:
      #   _site/
      #     CNAME              ← custom domain
      #     aura/
      #       privacy/
      #         index.md       ← Jekyll renders this to /aura/privacy/
      - name: Prepare deploy directory
        run: |
          mkdir -p _site/aura/privacy

          # CNAME tells GitHub Pages which custom domain to serve under.
          echo "showerideas.app" > _site/CNAME

          # Jekyll front-matter makes the page render with a title.
          cat <<'FRONTMATTER' > _site/aura/privacy/index.md
          ---
          title: "AURA Privacy Policy"
          layout: default
          ---
          FRONTMATTER

          # Append the policy body (strip the top-level H1 — the title comes
          # from the Jekyll front-matter above so it doesn't duplicate).
          tail -n +2 PRIVACY_POLICY.md >> _site/aura/privacy/index.md

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          # Keep previous deployments intact (e.g. if other pages exist).
          keep_files: true
          # Commit message shown in the gh-pages branch history.
          commit_message: "chore: deploy privacy policy (${{ github.sha }})"
