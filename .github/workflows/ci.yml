# PR-22 / v1.3: GitHub Actions CI for AURA.
#
# Every PR and every push to main runs:
#
#   1. testDebugUnitTest   — JVM unit tests. ~1 minute on a clean runner.
#   2. lintDebug           — Android Lint. Fails on new issues.
#   3. assembleRelease     — Full release build (R8 + shrinking). KEYSTORE_*
#                            env vars are blank in CI so an unsigned APK is
#                            produced — validates ProGuard rules cheaply.
#
# On push to main only (gated on `build` passing):
#   4. upload-to-play      — Builds a signed AAB (bundleRelease) using the
#                            KEYSTORE_BASE64 / KEYSTORE_* secrets and uploads
#                            to the Play Console internal track via
#                            r0adkll/upload-google-play@v1. Skipped if
#                            KEYSTORE_BASE64 is not configured.
#                            Required repo secrets:
#                              KEYSTORE_BASE64         base64-encoded .jks
#                              KEYSTORE_STORE_PASSWORD
#                              KEYSTORE_KEY_ALIAS
#                              KEYSTORE_KEY_PASSWORD
#                              GOOGLE_PLAY_JSON_KEY    Play service-account JSON
#
# androidTest runs in the parallel instrumented.yml workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Unit tests (testDebugUnitTest)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Android Lint (lintDebug)
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble release (assembleRelease)
        run: ./gradlew assembleRelease --stacktrace
        env:
          # Intentionally blank in CI. The signing config in
          # app/build.gradle.kts falls back to empty strings, and Gradle
          # produces an unsigned release APK. Real release signing is
          # done in the publishing pipeline with these populated.
          KEYSTORE_PATH: ""
          KEYSTORE_STORE_PASSWORD: ""
          KEYSTORE_KEY_ALIAS: ""
          KEYSTORE_KEY_PASSWORD: ""

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # upload-to-play: build a signed AAB and push to Play Console internal track.
  #
  # Runs only on push to main (not on pull_request) and only after `build`
  # passes. Skipped gracefully when KEYSTORE_BASE64 is not configured — safe
  # for forks and repos that haven't set up Play Console yet.
  # ---------------------------------------------------------------------------
  upload-to-play:
    name: Upload signed AAB to Play Console (internal)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Gate: push to main only — never run on PRs.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.KEYSTORE_BASE64 != ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      # Decode the base64-encoded keystore secret to a temp file so that
      # Gradle's signing config can reference it via KEYSTORE_PATH.
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build signed release bundle (bundleRelease)
        run: ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}

      # Wipe the keystore from disk immediately after the build step so it
      # doesn't linger in the runner's temp directory.
      - name: Shred keystore temp file
        if: always()
        run: shred -u /tmp/release.keystore || true

      - name: Upload signed AAB to Play Console internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: com.showerideas.aura
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          # changesNotSentForReview must be true for internal track uploads via API.
          changesNotSentForReview: true
