# GitHub Actions CI for AURA.
#
# Two parallel jobs — each on its own runner, each with a 90-min budget:
#
#   test  — JVM unit tests (GMS + FOSS) + JaCoCo coverage gate.
#   build — Android Lint + assembleGmsRelease + assembleFossRelease
#           + MediaPipe R8 check + APK size gate.
#
# Running in parallel means wall-clock time ≈ max(test_time, build_time)
# instead of their sum. Cold Kotlin compilation (~35-45 min on a 2-core
# runner) happens independently in each job but no longer blocks the other.
#
# Note: INTERNET permission is intentionally declared (QR relay POST feature).
# Signed APK releases are handled by release.yml (triggered on version tags).
# androidTest runs in the parallel instrumented.yml workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 now to avoid the breaking change on 2026-06-02
# (GitHub Actions removes Node.js 20 from runners on that date).
# Remove this once all referenced actions (checkout, setup-java, cache,
# upload-artifact, gradle/setup-gradle) ship native Node.js 24 support.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Unit tests + coverage gate
  # Compiles app + test sources, runs 87 test classes with parallel forks,
  # generates JaCoCo XML and enforces the 40% branch-coverage floor.
  # ---------------------------------------------------------------------------
  test:
    name: Unit tests & coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Cache the MediaPipe gesture model so CI doesn't re-download 8 MB on
      # every run. Cache key is the expected SHA-256 of the model file so a
      # model update (different hash) automatically busts the cache.
      - name: Cache MediaPipe gesture model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/gesture_recognizer.task
          key: mediapipe-gesture-model-${{ vars.GESTURE_MODEL_SHA256 || 'latest' }}
          restore-keys: |
            mediapipe-gesture-model-

      - name: Unit tests GMS (testGmsDebugUnitTest)
        run: ./gradlew testGmsDebugUnitTest --stacktrace

      - name: Unit tests FOSS (testFossDebugUnitTest)
        run: ./gradlew testFossDebugUnitTest --stacktrace

      # Prompt-10: generate JaCoCo XML report and enforce the 40% branch-
      # coverage floor. The report artifact is uploaded for tracking over time.
      - name: JaCoCo coverage report + gate (jacocoTestReport)
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Upload JaCoCo XML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Job 2: Lint + release builds + APK validation
  # Runs in parallel with the test job — independent Kotlin compilation on a
  # separate runner so neither job blocks the other.
  # ---------------------------------------------------------------------------
  build:
    name: Lint & assemble
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Cache MediaPipe gesture model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/gesture_recognizer.task
          key: mediapipe-gesture-model-${{ vars.GESTURE_MODEL_SHA256 || 'latest' }}
          restore-keys: |
            mediapipe-gesture-model-

      - name: Android Lint (lintGmsDebug)
        run: ./gradlew lintGmsDebug --stacktrace

      # Build both transport flavor variants to validate ProGuard rules on each.
      # assembleGmsRelease  — Nearby Connections transport (primary GMS build).
      # assembleFossRelease — Wi-Fi Direct transport (no GMS dependency).
      # Both are unsigned in CI (KEYSTORE_PATH empty); signed release APKs are
      # produced by release.yml when a version tag is pushed.
      - name: Assemble GMS release (assembleGmsRelease)
        run: ./gradlew assembleGmsRelease --stacktrace
        env:
          KEYSTORE_PATH: ""
          KEYSTORE_STORE_PASSWORD: ""
          KEYSTORE_KEY_ALIAS: ""
          KEYSTORE_KEY_PASSWORD: ""

      - name: Assemble FOSS release (assembleFossRelease)
        run: ./gradlew assembleFossRelease --stacktrace
        env:
          KEYSTORE_PATH: ""
          KEYSTORE_STORE_PASSWORD: ""
          KEYSTORE_KEY_ALIAS: ""
          KEYSTORE_KEY_PASSWORD: ""

      - name: Validate gesture bundle
        run: ./scripts/validate_gesture_bundle.sh app/src/main/assets/gesture_recognizer.task

      # Prompt-5: assert MediaPipe classes survived R8. Without the -keep rules
      # in proguard-rules.pro, R8 strips all com.google.mediapipe.** classes and
      # the gesture recognizer crashes on first use.
      - name: Check MediaPipe classes survived R8
        run: |
          APK=$(find app/build/outputs/apk/gms/release -name "*.apk" | head -1)
          echo "Checking MediaPipe classes in: $APK"
          # apkanalyzer moved from build-tools/<ver>/apkanalyzer to
          # cmdline-tools/latest/bin/apkanalyzer in modern Android SDK.
          # The subcommand also changed:
          #   old (build-tools):    apkanalyzer classes list <apk>
          #   new (cmdline-tools):  apkanalyzer dex packages --defined-only <apk>
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer" ]; then
            APKANALYZER="$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer"
            echo "Using apkanalyzer (cmdline-tools): $APKANALYZER"
            # 'dex packages' outputs dot-separated names: com.google.mediapipe…
            CLASSES=$("$APKANALYZER" dex packages --defined-only "$APK" 2>&1)
            GREP_PATTERN="com.google.mediapipe.tasks.vision"
          else
            APKANALYZER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -rV | head -1)/apkanalyzer"
            echo "Using apkanalyzer (build-tools): $APKANALYZER"
            # 'classes list' outputs slash-separated names: com/google/mediapipe…
            CLASSES=$("$APKANALYZER" classes list "$APK" 2>&1)
            GREP_PATTERN="com/google/mediapipe/tasks/vision"
          fi
          if ! echo "$CLASSES" | grep -q "$GREP_PATTERN"; then
            echo "FAIL: com.google.mediapipe.tasks.vision.* not found in release APK!"
            echo "R8 stripped MediaPipe classes. Check proguard-rules.pro MediaPipe section."
            echo "--- First 50 lines of class list for debugging ---"
            echo "$CLASSES" | head -50
            exit 1
          fi
          COUNT=$(echo "$CLASSES" | grep -i "mediapipe" | wc -l)
          echo "PASS: Found $COUNT MediaPipe entries in release APK."

      # Prompt-15: fail CI if the APK exceeds size thresholds.
      # ABI splits are enabled so we get one APK per architecture:
      #   arm64-v8a:   25 MB threshold  (MediaPipe arm64 native lib ~12-14 MB)
      #   armeabi-v7a: 22 MB threshold  (MediaPipe armeabi lib ~10-12 MB)
      #   universal:   35 MB threshold  (fallback if splits are ever disabled)
      - name: Check APK size thresholds
        run: |
          for APK in app/build/outputs/apk/gms/release/*.apk; do
            SIZE_KB=$(du -k "$APK" | cut -f1)
            SIZE_MB=$(echo "scale=1; $SIZE_KB / 1024" | bc)
            echo "APK: $APK — ${SIZE_MB} MB (${SIZE_KB} KB)"
            # Pick threshold based on ABI slice in filename.
            if echo "$APK" | grep -q "armeabi-v7a"; then
              MAX_KB=22528   # 22 MB for 32-bit ARM slice
            elif echo "$APK" | grep -q "arm64-v8a"; then
              MAX_KB=25600   # 25 MB for 64-bit ARM slice
            else
              MAX_KB=35840   # 35 MB fallback for universal APK
            fi
            if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
              echo "FAIL: APK size (${SIZE_MB} MB) exceeds $((MAX_KB / 1024)) MB threshold!"
              echo "Review recent dependency additions."
              exit 1
            fi
            echo "PASS: APK size within threshold ($((MAX_KB / 1024)) MB limit)."
          done

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-unsigned
          path: app/build/outputs/apk/gms/release/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload lint reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            app/build/reports/lint-results-gmsDebug.html
            app/build/reports/lint-results-gmsDebug.xml
          if-no-files-found: ignore
          retention-days: 14
