# PR-22 / v1.3: GitHub Actions CI for AURA.
#
# Every PR and every push to main runs:
#
#   1. testDebugUnitTest   — JVM unit tests. ~1 minute on a clean runner.
#   2. lintDebug           — Android Lint. Fails on new issues.
#   3. assembleRelease     — Full release build (R8 + shrinking). KEYSTORE_*
#                            env vars are blank in CI so an unsigned APK is
#                            produced — validates ProGuard rules cheaply.
#   4. check-mediapipe-classes — Prompt-5: assert MediaPipe classes survived R8.
#   5. check-apk-size      — Prompt-15: fail if APK exceeds size thresholds.
#
# Note: INTERNET permission is intentionally declared (QR relay POST feature).
#
# On push to main only (gated on `build` passing):
#   7. upload-to-play      — Signs and uploads to Play Console internal track.
#
# androidTest runs in the parallel instrumented.yml workflow.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node.js 24 now to avoid the breaking change on 2026-06-02
# (GitHub Actions removes Node.js 20 from runners on that date).
# Remove this once all referenced actions (checkout, setup-java, cache,
# upload-artifact, gradle/setup-gradle) ship native Node.js 24 support.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Prompt-5: Cache the MediaPipe gesture model so CI doesn't re-download
      # 8 MB on every run. Cache key is the expected SHA-256 of the model file
      # so a model update (different hash) automatically busts the cache.
      - name: Cache MediaPipe gesture model
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/gesture_recognizer.task
          key: mediapipe-gesture-model-${{ vars.GESTURE_MODEL_SHA256 || 'latest' }}
          restore-keys: |
            mediapipe-gesture-model-

      - name: Unit tests (testDebugUnitTest)
        run: ./gradlew testDebugUnitTest --stacktrace
        env:
          GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

      # Prompt-10: generate JaCoCo XML report and enforce the 40% branch-
      # coverage floor. The report artifact is uploaded for tracking over time.
      - name: JaCoCo coverage report + gate (jacocoTestReport)
        run: ./gradlew jacocoTestReport --stacktrace
        env:
          GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

      - name: Upload JaCoCo XML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/
          if-no-files-found: warn
          retention-days: 30

      - name: Android Lint (lintDebug)
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble release (assembleRelease)
        run: ./gradlew assembleRelease --stacktrace
        env:
          KEYSTORE_PATH: ""
          KEYSTORE_STORE_PASSWORD: ""
          KEYSTORE_KEY_ALIAS: ""
          KEYSTORE_KEY_PASSWORD: ""
          GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

      # Prompt-5: assert MediaPipe classes survived R8. Without the -keep rules
      # in proguard-rules.pro, R8 strips all com.google.mediapipe.** classes and
      # the gesture recognizer crashes on first use.
      - name: Check MediaPipe classes survived R8
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "Checking MediaPipe classes in: $APK"
          # apkanalyzer moved from build-tools/<ver>/apkanalyzer to
          # cmdline-tools/latest/bin/apkanalyzer in modern Android SDK.
          # The subcommand also changed:
          #   old (build-tools):    apkanalyzer classes list <apk>
          #   new (cmdline-tools):  apkanalyzer dex packages --defined-only <apk>
          if [ -x "$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer" ]; then
            APKANALYZER="$ANDROID_HOME/cmdline-tools/latest/bin/apkanalyzer"
            echo "Using apkanalyzer (cmdline-tools): $APKANALYZER"
            # 'dex packages' outputs dot-separated names: com.google.mediapipe…
            CLASSES=$("$APKANALYZER" dex packages --defined-only "$APK" 2>&1)
            GREP_PATTERN="com.google.mediapipe.tasks.vision"
          else
            APKANALYZER="$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -rV | head -1)/apkanalyzer"
            echo "Using apkanalyzer (build-tools): $APKANALYZER"
            # 'classes list' outputs slash-separated names: com/google/mediapipe…
            CLASSES=$("$APKANALYZER" classes list "$APK" 2>&1)
            GREP_PATTERN="com/google/mediapipe/tasks/vision"
          fi
          if ! echo "$CLASSES" | grep -q "$GREP_PATTERN"; then
            echo "FAIL: com.google.mediapipe.tasks.vision.* not found in release APK!"
            echo "R8 stripped MediaPipe classes. Check proguard-rules.pro MediaPipe section."
            echo "--- First 50 lines of class list for debugging ---"
            echo "$CLASSES" | head -50
            exit 1
          fi
          COUNT=$(echo "$CLASSES" | grep -i "mediapipe" | wc -l)
          echo "PASS: Found $COUNT MediaPipe entries in release APK."

      # Prompt-15: fail CI if the APK exceeds size thresholds.
      # ABI splits are enabled so we get one APK per architecture:
      #   arm64-v8a:   25 MB threshold  (MediaPipe arm64 native lib ~12-14 MB)
      #   armeabi-v7a: 22 MB threshold  (MediaPipe armeabi lib ~10-12 MB)
      #   universal:   35 MB threshold  (fallback if splits are ever disabled)
      - name: Check APK size thresholds
        run: |
          for APK in app/build/outputs/apk/release/*.apk; do
            SIZE_KB=$(du -k "$APK" | cut -f1)
            SIZE_MB=$(echo "scale=1; $SIZE_KB / 1024" | bc)
            echo "APK: $APK — ${SIZE_MB} MB (${SIZE_KB} KB)"
            # Pick threshold based on ABI slice in filename.
            if echo "$APK" | grep -q "armeabi-v7a"; then
              MAX_KB=22528   # 22 MB for 32-bit ARM slice
            elif echo "$APK" | grep -q "arm64-v8a"; then
              MAX_KB=25600   # 25 MB for 64-bit ARM slice
            else
              MAX_KB=35840   # 35 MB fallback for universal APK
            fi
            if [ "$SIZE_KB" -gt "$MAX_KB" ]; then
              echo "FAIL: APK size (${SIZE_MB} MB) exceeds $((MAX_KB / 1024)) MB threshold!"
              echo "Review recent dependency additions."
              exit 1
            fi
            echo "PASS: APK size within threshold ($((MAX_KB / 1024)) MB limit)."
          done

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aura-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: warn
          retention-days: 14

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests
            app/build/reports/lint-results-debug.html
            app/build/reports/lint-results-debug.xml
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------------------
  # upload-to-play: build a signed AAB and push to Play Console internal track.
  # ---------------------------------------------------------------------------
  upload-to-play:
    name: Upload signed AAB to Play Console (internal)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # secrets cannot be referenced in job-level `if:` expressions — GitHub
    # Actions treats the secrets context as unavailable there. Instead we gate
    # on push-to-main only, then check for the keystore secret inside the
    # first step and skip all signing/upload steps when it is absent.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Check signing credentials configured
        id: creds
        env:
          KEY_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEY_B64" ]; then
            echo "KEYSTORE_BASE64 not set — skipping Play Console upload."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.creds.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Set up JDK 17
        if: steps.creds.outputs.configured == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        if: steps.creds.outputs.configured == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Cache MediaPipe gesture model
        if: steps.creds.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: app/src/main/assets/gesture_recognizer.task
          key: mediapipe-gesture-model-${{ vars.GESTURE_MODEL_SHA256 || 'latest' }}

      - name: Decode keystore
        if: steps.creds.outputs.configured == 'true'
        env:
          KEY_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEY_B64" | base64 --decode > /tmp/release.keystore

      - name: Build signed release bundle (bundleRelease)
        if: steps.creds.outputs.configured == 'true'
        run: ./gradlew bundleRelease --stacktrace
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          KEYSTORE_KEY_ALIAS: ${{ secrets.KEYSTORE_KEY_ALIAS }}
          KEYSTORE_KEY_PASSWORD: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          GESTURE_MODEL_SHA256: ${{ vars.GESTURE_MODEL_SHA256 }}

      - name: Shred keystore temp file
        if: always()
        run: shred -u /tmp/release.keystore || true

      - name: Upload signed AAB to Play Console internal track
        if: steps.creds.outputs.configured == 'true'
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_JSON_KEY }}
          packageName: com.showerideas.aura
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
          changesNotSentForReview: true
