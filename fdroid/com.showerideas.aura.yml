# F-Droid metadata for AURA — Gesture-biometric contact exchange
# See: https://f-droid.org/docs/Build_Metadata_Reference/
#
# Phase 7.5: reproducible build configuration for the FOSS flavor.
# Build server: Ubuntu 22.04 (F-Droid buildserver), JDK 17, Android SDK 35.

Categories:
  - Security
  - Connectivity

License: MIT

SourceCode: https://github.com/showerideas/Aura
IssueTracker: https://github.com/showerideas/Aura/issues
Changelog: https://github.com/showerideas/Aura/releases

AutoName: AURA
Summary: Gesture-biometric proximity contact exchange

Description: |
  AURA authenticates contact exchange using your hand geometry as a biometric.
  Two people perform the same hand gesture simultaneously; MediaPipe extracts
  a 63-float hand-landmark embedding for each device. The embeddings seed a
  Double Ratchet key exchange (X3DH + per-message forward secrecy) so that
  profile data is always encrypted in transit.

  Exchange channels: Nearby Connections (GMS), Wi-Fi Direct (FOSS), QR relay
  (HTTPS fallback), NFC (planned).

  The FOSS flavor ships without Google Play Services. It uses WifiDirectTransport
  for proximity exchange and downloads the MediaPipe model at first launch,
  verifying the SHA-256 before use.

  Features:
  * Gesture biometric authentication (21-landmark hand embedding)
  * Double Ratchet encrypted exchange protocol
  * Short Authentication String (SAS) cross-device verification
  * Liveness detection (multi-frame drift guard against static photos)
  * Encrypted backup / restore (PBKDF2 + AES-256-GCM)
  * Wear OS tile — live exchange status on your wrist
  * Android Auto screens — SAS verification on head unit display
  * Enterprise MDM policy support (RestrictionsManager)

RepoType: git
Repo: https://github.com/showerideas/Aura

Builds:
  - versionName: 2.0.0-foss
    versionCode: 2
    commit: v2.0.0
    subdir: app
    gradle:
      - fossRelease
    # F-Droid build server pre-build hook: download and verify the MediaPipe model.
    # The SHA-256 is pinned in build.gradle.kts (GESTURE_MODEL_SHA256 variable).
    # F-Droid sets GESTURE_MODEL_SHA256 as a build-server environment variable.
    prebuild: ./gradlew downloadGestureModel
    # Ensure reproducible output: remove build timestamp from BuildConfig.
    # Gradle 8 respects SOURCE_DATE_EPOCH for reproducible builds.
    build: SOURCE_DATE_EPOCH=0 ./gradlew assembleFossRelease
    ndk: r26d

  # v2.0.1: NFC HCE full impl, SPKI runtime pinning, MediaPipe model unification,
  #         backup/restore polish (PRs #84-#87).
  # Hash: run `bash fdroid/reproducible_build_test.sh` and paste SHA-256 here
  #       before submitting to https://gitlab.com/fdroid/fdroiddata
  - versionName: 2.0.1-foss
    versionCode: 3
    commit: v2.0.1
    subdir: app
    gradle:
      - fossRelease
    prebuild: ./gradlew downloadGestureModel
    build: SOURCE_DATE_EPOCH=0 ./gradlew assembleFossRelease
    ndk: r26d
    # Hash: <paste SHA-256 from reproducible_build_test.sh output here>

# Update automatically when a new tag matching v*.*.* is pushed.
AutoUpdateMode: Version v%v
UpdateCheckMode: Tags ^v[0-9]+\.[0-9]+\.[0-9]+$
CurrentVersion: 2.0.1
CurrentVersionCode: 3
