AutoName: AURA
Summary: Gesture-biometric contact exchange
Description: |-
  AURA is a gesture-biometric contact exchange app for Android. Share your
  contact card with nearby peers using a hand gesture, NFC tap, or QR code —
  with end-to-end encryption and Short Authentication String verification to
  prevent MITM attacks.

  All data stays on-device. No cloud accounts, no tracking, no ads.

  Features:
  * Gesture authentication via MediaPipe hand tracking
  * Nearby Connections (Wi-Fi Direct) transport for FOSS flavor
  * NFC tap-to-exchange bootstrap
  * QR code fallback relay (encrypted, HTTPS only)
  * Short Authentication String (SAS) for first-meet MITM protection
  * Encrypted contact storage via Room + Android Keystore

